# ============================================================
# docker-compose.yml — NIKO酒馆 生产部署
# ============================================================
# 使用方式:
#   docker compose up -d                    # 启动（使用默认配置）
#   docker compose --env-file .env up -d    # 启动（使用自定义 .env）
# ============================================================

services:
  niko-tavern:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - niko-data:/app/data
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - DB_PATH=/app/data/niko-tavern.db
      - IMAGE_DIR=/app/data/images
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${SERVER_PORT:-8080}/api/scenarios"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  niko-data:
